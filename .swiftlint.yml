included:
  - Sources

# Quick spec files are inherently long (many nested context/it blocks) and
# use short, conventional names like `gt` for the subject under test.
# Relax these rules globally rather than fight the testing DSL.

disabled_rules:
  - static_over_final_class

identifier_name:
  min_length: 1
  excluded:
    - gt
    - id

function_body_length:
  warning: 200
  error: 400
